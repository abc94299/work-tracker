<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>工作追蹤器</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
  --border: #2e3345; --text: #e4e6ed; --text2: #8b8fa3;
  --accent: #6c8cff; --accent2: #4a6aef;
  --green: #34d399; --yellow: #fbbf24; --orange: #fb923c;
  --red: #f87171; --purple: #a78bfa; --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:600; }
.header-actions { display:flex; gap:8px; }
.btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.btn:hover { background:var(--border); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.primary:hover { background:var(--accent2); }
.btn.sm { padding:4px 10px; font-size:12px; }
.btn.danger { color:var(--red); }
.btn.danger:hover { background:rgba(248,113,113,.15); }

/* Sync bar */
.sync-bar { display:flex; align-items:center; gap:8px; padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); font-size:12px; color:var(--text2); }
.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
.sync-dot.off { background:var(--text2); }
.sync-bar a { color:var(--accent); cursor:pointer; text-decoration:none; margin-left:auto; }

/* Stale alert banner */
.stale-banner { display:none; padding:8px 16px; background:rgba(248,113,113,.1); border-bottom:1px solid rgba(248,113,113,.2); font-size:13px; color:var(--red); }
.stale-banner.show { display:flex; align-items:center; gap:6px; }

/* Filters */
.filters { display:flex; gap:6px; padding:10px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.filter-tab { padding:5px 12px; border-radius:20px; font-size:13px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); cursor:pointer; white-space:nowrap; transition:all .15s; }
.filter-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.filter-tab .count { display:inline-block; background:rgba(255,255,255,.15); border-radius:10px; padding:0 6px; margin-left:4px; font-size:11px; }
.filter-tab.active .count { background:rgba(255,255,255,.25); }

/* Status summary */
.status-summary { display:flex; gap:12px; padding:8px 16px; font-size:12px; color:var(--text2); flex-wrap:wrap; }
.status-summary .stat { display:flex; align-items:center; gap:4px; }
.status-summary .dot { width:8px; height:8px; border-radius:50%; }

/* Task list */
.task-list { padding:8px 12px; padding-bottom:80px; }

/* Desktop: sidebar + 2-col grid */
.app-body { display:block; }
.sidebar { display:none; }

@media (min-width:900px) {
  .app-body { display:flex; gap:0; }
  .sidebar {
    display:block; width:180px; flex-shrink:0; position:sticky; top:49px;
    height:calc(100vh - 49px); overflow-y:auto; background:var(--surface);
    border-right:1px solid var(--border); padding:12px 0;
  }
  .sidebar .nav-title { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; padding:8px 16px 4px; }
  .sidebar .nav-item {
    display:flex; align-items:center; gap:8px; padding:8px 16px; font-size:13px;
    color:var(--text2); cursor:pointer; transition:all .12s; border-left:3px solid transparent;
  }
  .sidebar .nav-item:hover { color:var(--text); background:var(--surface2); }
  .sidebar .nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(108,140,255,.06); }
  .sidebar .nav-item .nav-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .sidebar .nav-item .nav-count { margin-left:auto; font-size:11px; background:var(--surface2); padding:1px 6px; border-radius:8px; }
  .sidebar .nav-item.has-stale .nav-count { background:rgba(248,113,113,.15); color:var(--red); }
  .main-content { flex:1; min-width:0; }
  .task-list { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:12px 20px; padding-bottom:80px; max-width:none; margin:0; }
  .task-card { margin-bottom:0; }
  .filters { display:none; }
}

/* Task card - hybrid style */
.task-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; transition:all .15s; }
.task-card.stale { border-color:rgba(248,113,113,.4); }
.task-head { display:flex; align-items:center; gap:8px; }
.task-checkbox { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.task-checkbox:hover { border-color:var(--accent); }
.task-checkbox.done { background:var(--green); border-color:var(--green); }
.task-checkbox.done::after { content:"✓"; color:#fff; font-size:12px; font-weight:bold; }
.task-title { flex:1; font-size:15px; font-weight:600; }
.task-title.done-text { text-decoration:line-through; color:var(--text2); }
.task-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; margin-left:28px; }
.tag { font-size:11px; padding:2px 8px; border-radius:4px; }
.tag-stream { background:rgba(108,140,255,.15); color:var(--accent); }
.tag-status { font-weight:500; }
.s-待辦 { background:rgba(139,143,163,.15); color:var(--text2); }
.s-進行中 { background:rgba(108,140,255,.15); color:var(--accent); }
.s-等待中 { background:rgba(251,191,36,.15); color:var(--yellow); }
.s-卡住 { background:rgba(248,113,113,.15); color:var(--red); }
.s-完成 { background:rgba(52,211,153,.15); color:var(--green); }

/* Stale warning on card */
.stale-warn { display:flex; align-items:center; gap:5px; margin-top:8px; margin-left:28px; padding:5px 10px; background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.2); border-radius:6px; font-size:12px; color:var(--red); }

/* Latest update */
.latest-update { margin-top:8px; margin-left:28px; padding:8px 10px; background:rgba(108,140,255,.06); border-left:3px solid var(--accent); border-radius:0 6px 6px 0; font-size:13px; display:flex; gap:8px; align-items:flex-start; }
.latest-update .lu-date { font-size:11px; color:var(--text2); white-space:nowrap; padding-top:1px; }

/* Quick add */
.quick-row { display:flex; gap:6px; margin-top:8px; margin-left:28px; }
.quick-row input { flex:1; padding:7px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:13px; outline:none; font-family:inherit; }
.quick-row input:focus { border-color:var(--accent); }
.quick-row input::placeholder { color:var(--text2); }
.quick-row button { padding:7px 12px; border-radius:6px; border:none; background:var(--accent); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap; }

/* History toggle */
.history-toggle { font-size:12px; color:var(--text2); cursor:pointer; margin-top:6px; margin-left:28px; padding:4px 0; user-select:none; }
.history-toggle:hover { color:var(--accent); }
.history-list { display:none; margin-top:4px; margin-left:28px; border-top:1px solid var(--border); padding-top:6px; }
.history-list.open { display:block; }
.h-item { display:flex; gap:8px; padding:3px 0; font-size:12px; color:var(--text2); }
.h-item .hd { min-width:32px; font-size:11px; }

/* Goal display */
.task-goal { margin-top:8px; margin-left:28px; padding:6px 10px; background:rgba(167,139,250,.06); border-left:3px solid var(--purple); border-radius:0 6px 6px 0; font-size:12px; color:var(--purple); display:flex; align-items:flex-start; gap:6px; }
.task-goal .goal-label { font-weight:600; white-space:nowrap; }

/* Edit button */
.edit-btn { margin-left:auto; padding:2px 8px; border-radius:4px; border:1px solid var(--border); background:none; color:var(--text2); font-size:11px; cursor:pointer; }
.edit-btn:hover { color:var(--accent); border-color:var(--accent); }

/* Empty */
.empty { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-icon { font-size:48px; margin-bottom:12px; }

/* FAB */
.fab { position:fixed; bottom:24px; right:24px; width:52px; height:52px; border-radius:50%; background:var(--accent); color:#fff; font-size:28px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(108,140,255,.4); cursor:pointer; border:none; z-index:90; transition:all .15s; }
.fab:hover { transform:scale(1.05); background:var(--accent2); }

/* Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; justify-content:center; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); width:100%; max-width:480px; border-radius:16px 16px 0 0; padding:20px; max-height:85vh; overflow-y:auto; animation:slideUp .2s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal h2 { font-size:16px; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:5px; }
.form-group input,.form-group textarea,.form-group select { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:14px; outline:none; font-family:inherit; }
.form-group input:focus,.form-group textarea:focus { border-color:var(--accent); }
.form-group textarea { resize:vertical; min-height:60px; }
.form-actions { display:flex; gap:8px; margin-top:18px; }
.form-actions .btn { flex:1; padding:10px; text-align:center; font-size:14px; }
.status-picker,.stream-picker { display:flex; gap:6px; flex-wrap:wrap; }
.status-option,.stream-option { padding:6px 12px; border-radius:6px; font-size:13px; border:1px solid var(--border); background:var(--surface2); color:var(--text2); cursor:pointer; transition:all .15s; }
.status-option.selected { border-color:var(--accent); color:var(--text); background:rgba(108,140,255,.1); }
.stream-option.selected { border-color:var(--accent); color:var(--accent); background:rgba(108,140,255,.1); }
.settings-content { padding:4px 0; }
.settings-content .form-group { margin-bottom:16px; }
.settings-content .hint { font-size:11px; color:var(--text2); margin-top:4px; }
.token-input-wrap { display:flex; gap:6px; }
.token-input-wrap input { flex:1; }

@media (min-width:640px) {
  .header{padding:14px 24px} .header h1{font-size:20px} .filters{padding:12px 24px}
  .status-summary{padding:8px 24px}
  .modal{border-radius:16px;margin:auto;align-self:center} .fab{bottom:32px;right:32px}
}
@media (max-width:899px) {
  .task-list { max-width:720px; margin:0 auto; }
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lockScreen" style="display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;">
  <div style="text-align:center;width:280px;">
    <div style="font-size:40px;margin-bottom:16px;">🔒</div>
    <div id="lockLabel" style="font-size:16px;margin-bottom:20px;color:var(--text);">輸入密碼</div>
    <input id="lockPwd" type="password" placeholder="密碼" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;text-align:center;outline:none;" onkeydown="if(event.key==='Enter')unlock()">
    <button id="lockEnterBtn" onclick="unlock()" style="width:100%;margin-top:10px;padding:12px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:15px;cursor:pointer;">進入</button>
    <div id="lockErr" style="color:var(--red);font-size:13px;margin-top:10px;display:none;"></div>
    <div id="lockSetup" style="display:none;margin-top:20px;">
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px;">首次使用，請設定密碼</div>
      <input id="lockNewPwd" type="password" placeholder="設定密碼" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;text-align:center;outline:none;margin-bottom:6px;" onkeydown="if(event.key==='Enter')document.getElementById('lockNewPwd2').focus()">
      <input id="lockNewPwd2" type="password" placeholder="再輸入一次" style="width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;text-align:center;outline:none;" onkeydown="if(event.key==='Enter')setupPassword()">
      <button onclick="setupPassword()" style="width:100%;margin-top:10px;padding:12px;border-radius:8px;border:none;background:var(--green);color:#fff;font-size:15px;cursor:pointer;">設定密碼</button>
    </div>
  </div>
</div>

<div id="appMain" style="">
<div class="header">
  <h1>工作追蹤</h1>
  <div class="header-actions">
    <button class="btn sm" onclick="openSettings()">⚙️</button>
    <button class="btn sm" onclick="syncToGist()" id="syncBtn" title="同步">☁️</button>
  </div>
</div>
<div class="sync-bar"><span class="sync-dot off" id="syncDot"></span><span id="syncStatus">未連線 Gist</span><a onclick="openSettings()">設定</a></div>
<div class="stale-banner" id="staleBanner">⚠ 有任務超過 1 天未更新</div>
<div class="app-body">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="filters" id="filters"></div>
    <div class="status-summary" id="statusSummary"></div>
    <div class="task-list" id="taskList"></div>
  </div>
</div>
<button class="fab" onclick="openAddModal()">+</button>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal"><div class="modal">
  <h2 id="modalTitle">新增任務</h2>
  <div class="form-group"><label>任務名稱</label><input id="fTitle" placeholder="輸入任務名稱..."></div>
  <div class="form-group"><label>工作線</label><div class="stream-picker" id="fStream"></div></div>
  <div class="form-group"><label>狀態</label><div class="status-picker" id="fStatus"></div></div>
  <div class="form-group"><label>目標</label><input id="fGoal" placeholder="這個任務要達成什麼？"></div>
  <div class="form-group"><label>說明</label><textarea id="fNote" placeholder="說明、備註..."></textarea></div>
  <div class="form-actions">
    <button class="btn" onclick="closeModal('taskModal')">取消</button>
    <button class="btn danger" id="deleteBtn" onclick="deleteTask()" style="display:none">刪除</button>
    <button class="btn primary" onclick="saveTask()">儲存</button>
  </div>
</div></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal"><div class="modal">
  <h2>同步設定</h2>
  <div class="settings-content">
    <div class="form-group"><label>GitHub Personal Access Token</label><div class="token-input-wrap"><input id="sToken" type="password" placeholder="ghp_xxxx..."><button class="btn sm" onclick="toggleTokenVis()">👁</button></div><div class="hint">GitHub → Settings → Developer settings → Fine-grained tokens → scope: gist</div></div>
    <div class="form-group"><label>Gist ID（留空自動建立）</label><input id="sGistId" placeholder="貼上 Gist ID 或留空"><div class="hint">同步後自動填入</div></div>
    <div class="form-group"><label>工作線管理</label><input id="sStreams" placeholder="用逗號分隔"><div class="hint">修改後立即生效</div></div>
    <div class="form-actions"><button class="btn" onclick="closeModal('settingsModal')">取消</button><button class="btn primary" onclick="saveSettings()">儲存</button></div>
  </div>
</div></div>

<script>
const DEFAULT_STREAMS = ['An72','Debug','PPT','An7'];
const STATUSES = ['待辦','進行中','等待中','卡住','完成'];
const STALE_MS = 24 * 60 * 60 * 1000; // 1 day

const INITIAL_TASKS = [
  { id:'a72_dfi', title:'DFI仿真', stream:'An72', status:'進行中',
    goal:'互動式仿真取代靜態計算',
    note:'Torx批頭-螺絲介面力學仿真工具\n【交付】完整互動式HTML仿真工具',
    updates:[
      {date:'2026-03-24T00:00:00Z',text:'v4 專家仿真初版完成'},
      {date:'2026-03-26T00:00:00Z',text:'v5 推薦矩陣 + v6 傾斜掃描'},
      {date:'2026-03-26T00:00:00Z',text:'v7 力學修正 + 中文化'},
      {date:'2026-03-26T00:00:00Z',text:'v8 動態引擎 + UX redesign 完成'},
      {date:'2026-04-04T00:00:00Z',text:'確認參賽人名→提交報名'},
    ],
    created:'2026-03-24T00:00:00Z', updated:'2026-04-04T00:00:00Z' },
  { id:'a72_img', title:'實驗室圖像', stream:'An72', status:'進行中',
    goal:'透過圖像分析批頭磨損狀況與入牙點位置',
    note:'批頭磨損與入牙點測高計算\n【交付】磨損計算+入牙點測高功能',
    updates:[{date:'2026-04-04T00:00:00Z',text:'專案啟動'}],
    created:'2026-04-04T00:00:00Z', updated:'2026-04-04T00:00:00Z' },
  { id:'a72_listen', title:'ListenAgent', stream:'An72', status:'進行中',
    goal:'自動清理過期Torque資料避免磁碟爆滿',
    note:'產線自動檔案清理工具（Torque資料）\n【交付】部署到Vendor端',
    updates:[
      {date:'2026-03-21T00:00:00Z',text:'開發完成 + UserGuide'},
      {date:'2026-03-30T00:00:00Z',text:'20fix 版本完成'},
    ],
    created:'2026-03-21T00:00:00Z', updated:'2026-03-30T00:00:00Z' },
  { id:'a72_cd', title:'成都分類', stream:'An72', status:'進行中',
    goal:'確保有序流程推進',
    note:'成都工站分類模型，交由金著樂執行',
    updates:[{date:'2026-04-04T00:00:00Z',text:'等DRI回傳數據進行調參'}],
    created:'2026-04-04T00:00:00Z', updated:'2026-04-04T00:00:00Z' },
  { id:'dbg_cgsf', title:'CGSF受力模型', stream:'Debug', status:'等待中',
    goal:'建立CGSF專屬磨損/壽命分析',
    note:'CGSF工站批頭受力分析pipeline（與DFI不同工站，不可混用）\n【交付】全流程整合進PHM UI',
    updates:[
      {date:'2026-03-10T00:00:00Z',text:'本地端驗證通過'},
      {date:'2026-03-20T00:00:00Z',text:'已交付驗證報告給 DRI+IT'},
      {date:'2026-04-01T00:00:00Z',text:'等開發人員接全流程到 PHM UI'},
    ],
    created:'2026-03-02T00:00:00Z', updated:'2026-04-01T00:00:00Z' },
  { id:'ppt_comp', title:'比賽投影片', stream:'PPT', status:'進行中',
    goal:'對外參賽展示技術成果',
    note:'技術競賽用投影片\n【交付】比賽用PPT',
    updates:[
      {date:'2026-03-03T00:00:00Z',text:'已報名數字中國'},
      {date:'2026-04-04T00:00:00Z',text:'下一步：報名 MFPT / ISM'},
    ],
    created:'2026-03-03T00:00:00Z', updated:'2026-04-04T00:00:00Z' },
  { id:'a7_ng', title:'NG Action', stream:'An7', status:'進行中',
    goal:'產線NG智能行動指引系統',
    note:'',
    updates:[],
    created:'2026-04-04T00:00:00Z', updated:'2026-04-04T00:00:00Z' },
];

let state = { tasks:[], streams:[...DEFAULT_STREAMS], gistToken:'', gistId:'03ecdc9d3f928d55d70b4ea112e26a74', lastSync:null };
let activeFilter = '全部';
let editingId = null;

// Persistence
function loadState() {
  try {
    const raw = localStorage.getItem('worktracker_v2');
    if (raw) { const s = JSON.parse(raw); state = {...state,...s}; if(!state.streams||!state.streams.length) state.streams=[...DEFAULT_STREAMS]; }
    else { state.tasks = JSON.parse(JSON.stringify(INITIAL_TASKS)); state.streams=[...DEFAULT_STREAMS]; saveState(); }
  } catch(e) { state.tasks = JSON.parse(JSON.stringify(INITIAL_TASKS)); saveState(); }
}
function saveState() { localStorage.setItem('worktracker_v2', JSON.stringify(state)); }

// Stale check
function isStale(t) { return t.status !== '完成' && (Date.now() - new Date(t.updated).getTime()) > STALE_MS; }
function getStaleHours(t) { return Math.floor((Date.now() - new Date(t.updated).getTime()) / 3600000); }
function staleText(t) {
  const h = getStaleHours(t);
  if (h < 24) return '';
  const d = Math.floor(h/24);
  return d === 1 ? '已 1 天未更新' : `已 ${d} 天未更新`;
}

// Render
function render() {
  renderSidebar(); renderFilters(); renderSummary(); renderTasks(); renderSyncBar(); renderStaleBanner();
}
function renderSidebar() {
  const el = document.getElementById('sidebar');
  if (!el) return;
  const statusColors = {'待辦':'var(--text2)','進行中':'var(--accent)','等待中':'var(--yellow)','卡住':'var(--red)','完成':'var(--green)'};
  let html = '<div class="nav-title">工作線</div>';
  const allCount = state.tasks.filter(t=>t.status!=='完成').length;
  const allStale = state.tasks.some(t=>isStale(t));
  html += `<div class="nav-item${activeFilter==='全部'?' active':''}${allStale?' has-stale':''}" onclick="setFilter('全部')">
    <span class="nav-dot" style="background:var(--accent)"></span>全部<span class="nav-count">${allCount}</span></div>`;
  state.streams.forEach(s => {
    const tasks = state.tasks.filter(t=>t.stream===s&&t.status!=='完成');
    const count = tasks.length;
    const hasStale = tasks.some(t=>isStale(t));
    const dominantStatus = tasks.length ? tasks.sort((a,b)=>{const o={'卡住':0,'進行中':1,'等待中':2,'待辦':3};return(o[a.status]??3)-(o[b.status]??3);})[0].status : '待辦';
    html += `<div class="nav-item${activeFilter===s?' active':''}${hasStale?' has-stale':''}" onclick="setFilter('${s}')">
      <span class="nav-dot" style="background:${statusColors[dominantStatus]||'var(--text2)'}"></span>${s}<span class="nav-count">${count}</span></div>`;
  });
  html += '<div class="nav-title" style="margin-top:16px">狀態</div>';
  STATUSES.forEach(s => {
    const count = state.tasks.filter(t=>t.status===s).length;
    if (!count && s==='完成') return;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 16px;font-size:12px;color:var(--text2)">
      <span class="nav-dot" style="background:${statusColors[s]}"></span>${s}<span style="margin-left:auto">${count}</span></div>`;
  });
  el.innerHTML = html;
}
function renderStaleBanner() {
  const staleCount = state.tasks.filter(t => isStale(t)).length;
  const el = document.getElementById('staleBanner');
  if (staleCount > 0) { el.textContent = `⚠ ${staleCount} 個任務超過 1 天未更新`; el.classList.add('show'); }
  else { el.classList.remove('show'); }
}
function renderFilters() {
  const counts = {'全部':state.tasks.filter(t=>t.status!=='完成').length};
  state.streams.forEach(s=>{counts[s]=state.tasks.filter(t=>t.stream===s&&t.status!=='完成').length;});
  document.getElementById('filters').innerHTML = ['全部',...state.streams].map(s =>
    `<div class="filter-tab${activeFilter===s?' active':''}" onclick="setFilter('${s}')">${s}<span class="count">${counts[s]||0}</span></div>`
  ).join('');
}
function renderSummary() {
  const tasks = getFilteredTasks();
  const byStatus = {}; STATUSES.forEach(s=>byStatus[s]=0);
  tasks.forEach(t=>byStatus[t.status]=(byStatus[t.status]||0)+1);
  const colors={'待辦':'var(--text2)','進行中':'var(--accent)','等待中':'var(--yellow)','卡住':'var(--red)','完成':'var(--green)'};
  document.getElementById('statusSummary').innerHTML = STATUSES.map(s =>
    byStatus[s]?`<div class="stat"><span class="dot" style="background:${colors[s]}"></span>${s} ${byStatus[s]}</div>`:''
  ).join('');
}
function getFilteredTasks() {
  let tasks = state.tasks;
  if (activeFilter!=='全部') tasks = tasks.filter(t=>t.stream===activeFilter);
  const order={'卡住':0,'進行中':1,'等待中':2,'待辦':3,'完成':4};
  return [...tasks].sort((a,b) => {
    const sa = isStale(a)?-1:0, sb = isStale(b)?-1:0;
    if (sa!==sb) return sa-sb;
    return (order[a.status]??3)-(order[b.status]??3);
  });
}
function renderTasks() {
  const tasks = getFilteredTasks();
  const el = document.getElementById('taskList');
  if (!tasks.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>沒有任務</p></div>'; return; }
  el.innerHTML = tasks.map(t => {
    const stale = isStale(t);
    const updates = t.updates || [];
    const latest = updates.length ? updates[updates.length-1] : null;
    const history = updates.length > 1 ? updates.slice(0,-1).reverse() : [];
    return `
    <div class="task-card${stale?' stale':''}" id="card-${t.id}">
      <div class="task-head">
        <div class="task-checkbox${t.status==='完成'?' done':''}" onclick="toggleDone('${t.id}')"></div>
        <div class="task-title${t.status==='完成'?' done-text':''}">${esc(t.title)}</div>
        <button class="edit-btn" onclick="openEditModal('${t.id}')">編輯</button>
      </div>
      <div class="task-tags">
        <span class="tag tag-stream">${esc(t.stream)}</span>
        <span class="tag tag-status s-${t.status}">${t.status}</span>
      </div>
      ${t.goal&&t.status!=='完成'?`<div class="task-goal"><span class="goal-label">目標</span><span>${esc(t.goal)}</span></div>`:''}
      ${stale?`<div class="stale-warn">⚠ ${staleText(t)}</div>`:''}
      ${latest?`<div class="latest-update"><span class="lu-date">${fmtShort(latest.date)}</span><span>${esc(latest.text)}</span></div>`:''}
      <div class="quick-row">
        <input placeholder="新增更新..." onkeydown="if(event.key==='Enter')quickAdd('${t.id}',this)">
        <button onclick="quickAdd('${t.id}',this.previousElementSibling)">送出</button>
      </div>
      ${history.length?`
        <div class="history-toggle" onclick="toggleHistory(this)">▸ 歷史紀錄 (${history.length})</div>
        <div class="history-list">${history.map(h=>`<div class="h-item"><span class="hd">${fmtShort(h.date)}</span><span>${esc(h.text)}</span></div>`).join('')}</div>
      `:''}
    </div>`;
  }).join('');
}
function renderSyncBar() {
  const dot=document.getElementById('syncDot'), status=document.getElementById('syncStatus');
  if(state.gistToken&&state.gistId){dot.className='sync-dot';status.textContent=state.lastSync?`已同步 ${formatDate(state.lastSync)}`:'已連線，尚未同步';}
  else if(state.gistToken){dot.className='sync-dot';status.textContent='已設定 Token，同步時自動建立 Gist';}
  else{dot.className='sync-dot off';status.textContent='未連線 Gist';}
}

// Filters
function setFilter(f){activeFilter=f;render();}

// Quick add update
function quickAdd(id, input) {
  const text = input.value.trim(); if(!text) return;
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  if(!t.updates) t.updates=[];
  t.updates.push({date:new Date().toISOString(), text});
  t.updated = new Date().toISOString();
  input.value='';
  saveState(); render();
}

// Toggle history
function toggleHistory(el) {
  const h=el.nextElementSibling;
  const open=h.classList.toggle('open');
  el.textContent=el.textContent.replace(/[▸▾]/,open?'▾':'▸');
}

// Task CRUD
function openAddModal() {
  editingId=null;
  document.getElementById('modalTitle').textContent='新增任務';
  document.getElementById('fTitle').value='';
  document.getElementById('fGoal').value='';
  document.getElementById('fNote').value='';
  document.getElementById('deleteBtn').style.display='none';
  renderStreamPicker(activeFilter!=='全部'?activeFilter:state.streams[0]);
  renderStatusPicker('待辦');
  openModal('taskModal');
  setTimeout(()=>document.getElementById('fTitle').focus(),200);
}
function openEditModal(id) {
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='編輯任務';
  document.getElementById('fTitle').value=t.title;
  document.getElementById('fGoal').value=t.goal||'';
  document.getElementById('fNote').value=t.note||'';
  document.getElementById('deleteBtn').style.display='';
  renderStreamPicker(t.stream);
  renderStatusPicker(t.status);
  openModal('taskModal');
}
function renderStreamPicker(sel){document.getElementById('fStream').innerHTML=state.streams.map(s=>`<div class="stream-option${s===sel?' selected':''}" onclick="pickOpt(this)">${s}</div>`).join('');}
function renderStatusPicker(sel){document.getElementById('fStatus').innerHTML=STATUSES.map(s=>`<div class="status-option${s===sel?' selected':''}" onclick="pickOpt(this)">${s}</div>`).join('');}
function pickOpt(el){el.parentElement.querySelectorAll('.stream-option,.status-option').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');}
function getSelectedStream(){const el=document.querySelector('#fStream .selected');return el?el.textContent:state.streams[0];}
function getSelectedStatus(){const el=document.querySelector('#fStatus .selected');return el?el.textContent:'待辦';}

function saveTask() {
  const title=document.getElementById('fTitle').value.trim(); if(!title)return;
  const now=new Date().toISOString();
  if(editingId){
    const t=state.tasks.find(x=>x.id===editingId);
    if(t){t.title=title;t.stream=getSelectedStream();t.status=getSelectedStatus();t.goal=document.getElementById('fGoal').value.trim();t.note=document.getElementById('fNote').value.trim();t.updated=now;}
  } else {
    state.tasks.push({id:genId(),title,stream:getSelectedStream(),status:getSelectedStatus(),goal:document.getElementById('fGoal').value.trim(),note:document.getElementById('fNote').value.trim(),updates:[],created:now,updated:now});
  }
  saveState();render();closeModal('taskModal');
}
function deleteTask(){if(!editingId)return;if(!confirm('確定刪除？'))return;state.tasks=state.tasks.filter(t=>t.id!==editingId);editingId=null;saveState();render();closeModal('taskModal');}
function toggleDone(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.status=t.status==='完成'?'待辦':'完成';t.updated=new Date().toISOString();saveState();render();}

// Gist Sync
async function syncToGist(){if(!state.gistToken){const t=prompt('請貼上 GitHub Classic Token（scope: gist）：');if(!t)return;state.gistToken=t.trim();saveState();renderSyncBar();}const btn=document.getElementById('syncBtn');btn.textContent='⏳';btn.disabled=true;try{if(state.gistId)await pullFromGist();await pushToGist();state.lastSync=new Date().toISOString();saveState();render();btn.textContent='✅';setTimeout(()=>{btn.textContent='☁️';},1500);}catch(e){console.error(e);alert('同步失敗：'+e.message);btn.textContent='☁️';}btn.disabled=false;}
async function pullFromGist(){const res=await fetch(`https://api.github.com/gists/${state.gistId}`,{headers:{'Authorization':`token ${state.gistToken}`}});if(!res.ok)throw new Error('讀取失敗');const data=await res.json();const file=data.files['worktracker.json'];if(!file)return;const remote=JSON.parse(file.content);mergeRemote(remote);saveState();}
function mergeRemote(remote){if(!remote||!remote.tasks)return;const lm={},rm={};state.tasks.forEach(t=>lm[t.id]=t);remote.tasks.forEach(t=>rm[t.id]=t);const all=new Set([...Object.keys(lm),...Object.keys(rm)]);const merged=[];all.forEach(id=>{const l=lm[id],r=rm[id];if(l&&r){const winner=new Date(l.updated)>=new Date(r.updated)?l:r;merged.push(winner);}else merged.push(l||r);});state.tasks=merged;if(remote.streams){state.streams=[...new Set([...state.streams,...remote.streams])];}}
async function pushToGist(){const payload={tasks:state.tasks,streams:state.streams,lastSync:new Date().toISOString()};const body={description:'工作追蹤器',files:{'worktracker.json':{content:JSON.stringify(payload,null,2)}}};let res;if(state.gistId){res=await fetch(`https://api.github.com/gists/${state.gistId}`,{method:'PATCH',headers:{'Authorization':`token ${state.gistToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});}else{body.public=false;res=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':`token ${state.gistToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});}if(!res.ok)throw new Error('寫入失敗');const data=await res.json();if(!state.gistId){state.gistId=data.id;saveState();}}

// Settings
function openSettings(){document.getElementById('sToken').value=state.gistToken||'';document.getElementById('sGistId').value=state.gistId||'';document.getElementById('sStreams').value=state.streams.join(',');openModal('settingsModal');}
function saveSettings(){state.gistToken=document.getElementById('sToken').value.trim();state.gistId=document.getElementById('sGistId').value.trim();const s=document.getElementById('sStreams').value.split(',').map(s=>s.trim()).filter(Boolean);if(s.length)state.streams=s;saveState();render();closeModal('settingsModal');}
function toggleTokenVis(){const el=document.getElementById('sToken');el.type=el.type==='password'?'text':'password';}

// Modal
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});

// Utils
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function formatDate(iso){if(!iso)return'';const d=new Date(iso),now=new Date(),diff=now-d;if(diff<60000)return'剛才';if(diff<3600000)return Math.floor(diff/60000)+'分鐘前';if(diff<86400000)return Math.floor(diff/3600000)+'小時前';if(diff<172800000)return'昨天';return`${d.getMonth()+1}/${d.getDate()}`;}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()}`;}

// Password Lock
async function hashPwd(pwd){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function initLock(){
  // 開發階段：跳過密碼鎖
  enterApp(); return;
  const stored=localStorage.getItem('worktracker_pwd');
  if(!stored){document.getElementById('lockLabel').textContent='首次使用';document.getElementById('lockPwd').style.display='none';document.getElementById('lockEnterBtn').style.display='none';document.getElementById('lockSetup').style.display='block';}
  else{document.getElementById('lockPwd').focus();}
}
async function setupPassword(){const p1=document.getElementById('lockNewPwd').value,p2=document.getElementById('lockNewPwd2').value;if(!p1)return;if(p1!==p2){document.getElementById('lockErr').textContent='兩次密碼不一致';document.getElementById('lockErr').style.display='';return;}localStorage.setItem('worktracker_pwd',await hashPwd(p1));enterApp();}
async function unlock(){const pwd=document.getElementById('lockPwd').value;if(!pwd)return;if(await hashPwd(pwd)===localStorage.getItem('worktracker_pwd'))enterApp();else{document.getElementById('lockErr').textContent='密碼錯誤';document.getElementById('lockErr').style.display='';document.getElementById('lockPwd').value='';document.getElementById('lockPwd').focus();}}
function enterApp(){document.getElementById('lockScreen').style.display='none';document.getElementById('appMain').style.display='';loadState();render();if(state.gistToken&&state.gistId)syncToGist();}

initLock();
</script>
</body>
</html>
